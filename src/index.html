<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomadoro</title>
  <!-- Inspired by pomofocus.io -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1><i class="fas fa-tomato"></i> Tomadoro</h1>

  <div class="timer-container">
    <div class="mode-buttons">
      <button id="pomo-btn" class="active" onclick="setMode(0)">
        <i class="fas fa-fire"></i>Pomodoro
      </button>
      <button id="short-btn" onclick="setMode(1)">
        <i class="fas fa-coffee"></i>Short Break
      </button>
      <button id="long-btn" onclick="setMode(2)">
        <i class="fas fa-chair"></i>Long Break
      </button>
    </div>
    
    <svg class="progress-ring" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#333" stroke-width="8"/>
      <circle id="progress" cx="50" cy="50" r="45" fill="none" stroke="#e74c3c" stroke-width="8" 
              stroke-dasharray="282.74" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 50 50)"/>
    </svg>
    
    <div id="timer">25:00</div>
    
    <div class="controls">
      <button id="start-btn" onclick="toggleTimer()">
        <i class="fas fa-play"></i>Start
      </button>
      <button onclick="resetTimer()">
        <i class="fas fa-redo"></i>Reset
      </button>
    </div>
  </div>

  <div class="tasks">
    <div class="task-input">
      <input type="text" id="task-name" placeholder="What are you working on?">
      <input type="number" id="task-pomos" value="1" min="1">
      <button onclick="addTask()">
        <i class="fas fa-plus"></i>Add
      </button>
    </div>
    
    <ul id="task-list" class="task-list"></ul>
    
    <button class="clear-tasks-btn" onclick="showClearConfirmation()">
      <i class="fas fa-trash"></i>Clear All Tasks
    </button>
    
    <div class="stats">
      <div><i class="fas fa-check-circle"></i> Completed today: <span id="completed-count">0</span> tomadoros</div>
      <div><i class="fas fa-clock"></i> Estimated finish: <span id="finish-time">--:--</span></div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h2><i class="fas fa-exclamation-triangle"></i> Clear All Tasks?</h2>
      <p>This action cannot be undone.</p>
      <div class="modal-buttons">
        <button onclick="cancelClear()" style="background: #555;">Cancel</button>
        <button onclick="clearAllTasks()" style="background: #e74c3c;">Clear All</button>
      </div>
    </div>
  </div>

  <script src='./index.js'> </script>
</body>
</html>
