<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomadoro</title>
  <!-- Inspired by pomofocus.io -->
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e1e;
      color: #fff;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .timer-container {
      text-align: center;
      margin-bottom: 30px;
    }
    .mode-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      background: #333;
      color: #fff;
      cursor: pointer;
    }
    button.active {
      background: #e74c3c;
    }
    #timer {
      font-size: 6rem;
      font-weight: bold;
      margin: 20px 0;
    }
    .progress-ring {
      width: 280px;
      height: 280px;
      margin: 0 auto;
    }
    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    .controls button {
      padding: 15px 30px;
      font-size: 1.2rem;
      background: #e74c3c;
    }
    .tasks {
      width: 100%;
      max-width: 600px;
    }
    .task-input {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: #fff;
    }
    input[type="number"] {
      width: 80px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: #fff;
    }
    .task-list {
      list-style: none;
      padding: 0;
    }
    .task-item {
      background: #2a2a2a;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .task-item.completed {
      text-decoration: line-through;
      opacity: 0.6;
    }
    .stats {
      margin-top: 20px;
      text-align: center;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>Tomadoro</h1>

  <div class="timer-container">
    <div class="mode-buttons">
      <button id="pomo-btn" class="active" onclick="setMode(0)">Pomodoro</button>
      <button id="short-btn" onclick="setMode(1)">Short Break</button>
      <button id="long-btn" onclick="setMode(2)">Long Break</button>
    </div>
    
    <svg class="progress-ring" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#333" stroke-width="8"/>
      <circle id="progress" cx="50" cy="50" r="45" fill="none" stroke="#e74c3c" stroke-width="8" 
              stroke-dasharray="282.74" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 50 50)"/>
    </svg>
    
    <div id="timer">25:00</div>
    
    <div class="controls">
      <button id="start-btn" onclick="toggleTimer()">Start</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <div class="tasks">
    <div class="task-input">
      <input type="text" id="task-name" placeholder="What are you working on?">
      <input type="number" id="task-pomos" value="1" min="1">
      <button onclick="addTask()">Add Task</button>
    </div>
    
    <ul id="task-list" class="task-list"></ul>
    
    <div class="stats">
      <div>Completed today: <span id="completed-count">0</span> pomodoros</div>
      <div>Estimated finish: <span id="finish-time">--:--</span></div>
    </div>
  </div>

  <script src='./index.js'> </script>
</body>
</html>
