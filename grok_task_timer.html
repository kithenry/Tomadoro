<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PomoFocus Clone</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e1e;
      color: #fff;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .timer-container {
      text-align: center;
      margin-bottom: 30px;
    }
    .mode-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      background: #333;
      color: #fff;
      cursor: pointer;
    }
    button.active {
      background: #e74c3c;
    }
    #timer {
      font-size: 6rem;
      font-weight: bold;
      margin: 20px 0;
    }
    .progress-ring {
      width: 280px;
      height: 280px;
      margin: 0 auto;
    }
    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    .controls button {
      padding: 15px 30px;
      font-size: 1.2rem;
      background: #e74c3c;
    }
    .tasks {
      width: 100%;
      max-width: 600px;
    }
    .task-input {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: #fff;
    }
    input[type="number"] {
      width: 80px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: #fff;
    }
    .task-list {
      list-style: none;
      padding: 0;
    }
    .task-item {
      background: #2a2a2a;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .task-item.completed {
      text-decoration: line-through;
      opacity: 0.6;
    }
    .stats {
      margin-top: 20px;
      text-align: center;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>PomoFocus</h1>

  <div class="timer-container">
    <div class="mode-buttons">
      <button id="pomo-btn" class="active" onclick="setMode(0)">Pomodoro</button>
      <button id="short-btn" onclick="setMode(1)">Short Break</button>
      <button id="long-btn" onclick="setMode(2)">Long Break</button>
    </div>
    
    <svg class="progress-ring" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#333" stroke-width="8"/>
      <circle id="progress" cx="50" cy="50" r="45" fill="none" stroke="#e74c3c" stroke-width="8" 
              stroke-dasharray="282.74" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 50 50)"/>
    </svg>
    
    <div id="timer">25:00</div>
    
    <div class="controls">
      <button id="start-btn" onclick="toggleTimer()">Start</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <div class="tasks">
    <div class="task-input">
      <input type="text" id="task-name" placeholder="What are you working on?">
      <input type="number" id="task-pomos" value="1" min="1">
      <button onclick="addTask()">Add Task</button>
    </div>
    
    <ul id="task-list" class="task-list"></ul>
    
    <div class="stats">
      <div>Completed today: <span id="completed-count">0</span> pomodoros</div>
      <div>Estimated finish: <span id="finish-time">--:--</span></div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let timeLeft = 25 * 60;
      let timerInterval = null;
      let isRunning = false;
      let currentMode = 0; // 0: pomodoro, 1: short, 2: long
      let totalPomosDone = 0;
      let cycleCount = 0;

      const modes = [
        { name: "Pomodoro", time: 25 * 60, color: "#e74c3c" },
        { name: "Short Break", time: 5 * 60, color: "#27ae60" },
        { name: "Long Break", time: 15 * 60, color: "#2980b9" }
      ];

      const tasks = [];

      function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById('timer').textContent = 
          `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

        const total = modes[currentMode].time;
        const progress = (timeLeft / total) * 282.74;
        const circle = document.getElementById('progress');
        circle.setAttribute('stroke-dashoffset', 282.74 - progress);
        circle.setAttribute('stroke', modes[currentMode].color);
      }

      window.setMode = function(mode) {
        if (timerInterval) clearInterval(timerInterval);
        isRunning = false;
        currentMode = mode;
        timeLeft = modes[mode].time;
        
        document.querySelectorAll('.mode-buttons button').forEach((btn, i) => {
          btn.classList.toggle('active', i === mode);
        });
        
        document.getElementById('start-btn').textContent = 'Start';
        updateDisplay();
      };

      window.toggleTimer = function() {
        const startBtn = document.getElementById('start-btn');
        
        if (isRunning) {
          clearInterval(timerInterval);
          isRunning = false;
          startBtn.textContent = 'Start';
        } else {
          timerInterval = setInterval(() => {
            timeLeft--;
            updateDisplay();
            
            if (timeLeft <= 0) {
              clearInterval(timerInterval);
              isRunning = false;
              handleTimerEnd();
            }
          }, 1000);
          isRunning = true;
          startBtn.textContent = 'Pause';
        }
      };

      function handleTimerEnd() {
        if (currentMode === 0) { // Finished pomodoro
          totalPomosDone++;
          cycleCount++;
          updateStats();
          
          // Auto switch to break
          if (cycleCount % 4 === 0) {
            setMode(2); // Long break
          } else {
            setMode(1); // Short break
          }
        } else {
          // Finished break → back to pomodoro
          setMode(0);
        }
        
        // Simple notification + auto-start next session
        const message = `${modes[currentMode].name} complete!`;
        alert(message);
        toggleTimer(); // Auto-start next
      }

      window.resetTimer = function() {
        if (timerInterval) clearInterval(timerInterval);
        isRunning = false;
        timeLeft = modes[currentMode].time;
        document.getElementById('start-btn').textContent = 'Start';
        updateDisplay();
      };

      window.addTask = function() {
        const name = document.getElementById('task-name').value.trim();
        const estimated = parseInt(document.getElementById('task-pomos').value) || 1;
        
        if (!name) return;
        
        tasks.push({
          name,
          estimated,
          completed: 0,
          done: false
        });
        
        document.getElementById('task-name').value = '';
        renderTasks();
        updateStats();
      };

      function renderTasks() {
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        
        tasks.forEach((task, index) => {
          const li = document.createElement('li');
          li.className = `task-item ${task.done ? 'completed' : ''}`;
          li.innerHTML = `
            <div>
              <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTaskDone(${index})">
              <span>${task.name}</span>
              <small> (${task.completed}/${task.estimated})</small>
            </div>
            <div>
              <button onclick="incrementPomo(${index})">+</button>
              <button onclick="deleteTask(${index})">×</button>
            </div>
          `;
          list.appendChild(li);
        });
      }

      window.toggleTaskDone = function(index) {
        tasks[index].done = !tasks[index].done;
        renderTasks();
        updateStats();
      };

      window.incrementPomo = function(index) {
        if (tasks[index].completed < tasks[index].estimated) {
          tasks[index].completed++;
          renderTasks();
          updateStats();
        }
      };

      window.deleteTask = function(index) {
        tasks.splice(index, 1);
        renderTasks();
        updateStats();
      };

      function updateStats() {
        document.getElementById('completed-count').textContent = totalPomosDone;
        
        const remainingPomos = tasks.reduce((sum, t) => sum + (t.estimated - t.completed), 0);
        if (remainingPomos > 0) {
          const now = new Date();
          const minutesToAdd = remainingPomos * 25 + Math.floor(remainingPomos / 4) * 15;
          now.setMinutes(now.getMinutes() + minutesToAdd);
          const finishStr = now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
          document.getElementById('finish-time').textContent = finishStr;
        } else {
          document.getElementById('finish-time').textContent = 'Done!';
        }
      }

      // Keyboard shortcuts (Space = start/pause, 1/2/3 = modes, R = reset)
      document.addEventListener('keydown', (e) => {
        if (e.key === ' ') {
          e.preventDefault();
          toggleTimer();
        }
        if (e.key === '1') setMode(0);
        if (e.key === '2') setMode(1);
        if (e.key === '3') setMode(2);
        if (e.key.toLowerCase() === 'r') resetTimer();
      });

      // Initialize
      updateDisplay();
      renderTasks();
      updateStats();
    });
  </script>
</body>
</html>
